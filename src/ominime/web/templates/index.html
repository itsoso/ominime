<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMe - 输入追踪仪表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #242430;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #2a2a3a;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            --gradient-3: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% -20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { font-size: 12px; color: var(--text-muted); display: block; }

        .nav-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .tab-buttons { display: flex; gap: 4px; background: var(--bg-card); padding: 4px; border-radius: 10px; }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        .date-nav { display: flex; align-items: center; gap: 8px; }
        .date-nav button, .date-nav input[type="date"] {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .date-nav button:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-primary); }
        .date-nav input[type="date"] { color: var(--text-primary); font-family: inherit; }
        .date-nav input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* 概览卡片 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--accent-primary); box-shadow: 0 8px 30px -10px var(--accent-glow); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gradient-1); }
        .stat-card:nth-child(2)::before { background: var(--gradient-2); }
        .stat-card:nth-child(3)::before { background: var(--gradient-3); }
        .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }

        .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* 标签页内容 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        /* 应用内容展示 */
        .app-content-list { display: flex; flex-direction: column; gap: 20px; }

        .app-content-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .app-content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        .app-content-header:hover { background: var(--bg-hover); }

        .app-content-info { display: flex; align-items: center; gap: 12px; }
        .app-content-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            background: var(--bg-hover);
        }
        .app-content-name { font-weight: 600; font-size: 16px; }
        .app-content-stats { font-size: 13px; color: var(--text-secondary); }

        .app-content-toggle {
            font-size: 20px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }
        .app-content-item.expanded .app-content-toggle { transform: rotate(180deg); }

        .app-content-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .app-content-item.expanded .app-content-body { max-height: 2000px; }

        .content-text {
            padding: 20px;
            font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border-radius: 0 0 12px 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .content-text::-webkit-scrollbar { width: 8px; }
        .content-text::-webkit-scrollbar-track { background: var(--bg-secondary); }
        .content-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Enter 上下文证据卡片 */
        .context-feed { display: flex; flex-direction: column; gap: 18px; }
        .context-card {
            background: linear-gradient(145deg, rgba(18, 18, 26, 0.96), rgba(26, 26, 36, 0.98));
            border: 1px solid rgba(129, 140, 248, 0.22);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 18px 50px -32px rgba(99, 102, 241, 0.75);
        }
        .context-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }
        .context-app { font-weight: 700; font-size: 16px; }
        .context-meta { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }
        .context-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
        .context-badge {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 10px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
            font-size: 12px;
        }
        .context-badge.ok { border-color: rgba(16, 185, 129, 0.45); color: #6ee7b7; }
        .context-badge.pending { border-color: rgba(245, 158, 11, 0.45); color: #fcd34d; }
        .context-badge.failed, .context-badge.missing_dependency, .context-badge.invalid_json { border-color: rgba(239, 68, 68, 0.45); color: #fca5a5; }
        .context-card-body {
            padding: 20px;
        }
        .context-text {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            white-space: pre-wrap;
            color: var(--text-primary);
            line-height: 1.8;
        }
        .context-analysis {
            margin-top: 14px;
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.16);
            border-radius: 14px;
            padding: 14px;
            color: var(--text-secondary);
        }
        .context-analysis-title { color: #6ee7b7; font-weight: 700; margin-bottom: 8px; }
        .context-kv {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .context-kv div { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }

        /* 图表 */
        .chart-container { position: relative; height: 300px; }

        /* 应用列表 */
        .app-list { list-style: none; }
        .app-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 14px; }
        .app-item:last-child { border-bottom: none; }
        .app-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--bg-hover); }
        .app-info { flex: 1; }
        .app-name { font-weight: 500; margin-bottom: 4px; }
        .app-stats-text { font-size: 12px; color: var(--text-secondary); }
        .percentage-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; }
        .progress-bar { width: 100px; height: 6px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: var(--gradient-1); border-radius: 3px; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 分析页面 */
        .analysis-content { padding: 20px; }
        .analysis-section { margin-bottom: 30px; }
        .analysis-section:last-child { margin-bottom: 0; }
        .analysis-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
        .analysis-text { 
            line-height: 1.8; 
            color: var(--text-secondary); 
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .analysis-text p { margin: 12px 0; }
        .suggestions-list { 
            list-style: none; 
            padding: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .suggestions-list li { 
            padding: 12px 0; 
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .suggestions-list li:last-child { border-bottom: none; }

        /* 工作路径分析 */
        .work-path-content { padding: 20px; }
        .work-path-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .work-path-stat-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .work-path-section { margin-bottom: 30px; }
        .work-path-section:last-child { margin-bottom: 0; }
        .work-path-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
        .peak-hours {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .peak-hour-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .peak-hour-time {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent-primary);
        }
        .peak-hour-chars {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .focus-periods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .focus-period-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .focus-period-time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
            font-weight: 500;
        }
        .focus-period-app {
            flex: 1;
            color: var(--text-secondary);
        }
        .focus-period-duration {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 12px; }

        /* 主题分析样式 */
        .theme-section { margin-bottom: 24px; }
        .theme-section:last-child { margin-bottom: 0; }
        .theme-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text-primary); 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .theme-tag {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--accent-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .theme-content-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-secondary);
        }
        .interest-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .interest-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .interest-icon {
            color: var(--accent-primary);
            font-size: 16px;
        }
        .insight-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .insight-item {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(52, 211, 153, 0.1) 100%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.6;
        }
        .insight-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        .insight-text {
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .nav-controls { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⌨️</span>
                <div>
                    <h1>OmniMe</h1>
                    <span>输入追踪仪表板</span>
                </div>
            </div>
            <div class="nav-controls">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('overview')">📊 概览</button>
                    <button class="tab-btn" onclick="switchTab('analysis')">🤖 分析</button>
                    <button class="tab-btn" onclick="switchTab('content')">📝 内容</button>
                    <button class="tab-btn" onclick="switchTab('context')">🧠 上下文</button>
                </div>
                <div class="date-nav">
                    <button onclick="changeDate(-1)">←</button>
                    <input type="date" id="datePicker" onchange="onDatePickerChange()">
                    <button onclick="changeDate(1)">→</button>
                    <button onclick="goToToday()">今天</button>
                </div>
            </div>
        </header>

        <!-- 概览卡片 -->
        <div class="overview-grid">
            <div class="stat-card">
                <div class="stat-label">📝 总字符</div>
                <div class="stat-value" id="todayChars">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📱 应用数</div>
                <div class="stat-value" id="todayApps">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔢 会话数</div>
                <div class="stat-value" id="todaySessions">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ 活跃时间</div>
                <div class="stat-value" id="todayTime">-</div>
            </div>
        </div>

        <!-- 概览标签页 -->
        <div id="tab-overview" class="tab-content active">
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📊 每小时分布</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="hourlyChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📱 应用分布</h2>
                    </div>
                    <ul class="app-list" id="appList">
                        <div class="loading"><div class="loading-spinner"></div></div>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 分析标签页 -->
        <div id="tab-analysis" class="tab-content">
            <!-- 主题深度分析 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🎯 主题深度分析</h2>
                    <button onclick="loadThemeAnalysis()" style="background: var(--accent-primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;">🔄 刷新分析</button>
                </div>
                <div id="themeAnalysisContent" class="analysis-content">
                    <div class="empty-state"><div class="icon">💡</div><p>点击"刷新分析"获取 AI 深度分析</p></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🤖 AI 工作分析</h2>
                </div>
                <div id="aiAnalysisContent" class="analysis-content">
                    <div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🛤️ 工作路径分析</h2>
                </div>
                <div id="workPathContent" class="work-path-content">
                    <div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>
                </div>
            </div>
        </div>

        <!-- 内容标签页 -->
        <div id="tab-content" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📝 按应用查看完整输入内容</h2>
                </div>
                <div class="app-content-list" id="appContentList">
                    <div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>
                </div>
            </div>
        </div>

        <!-- 上下文标签页 -->
        <div id="tab-context" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🧠 Enter 提交上下文</h2>
                    <button class="tab-btn" onclick="loadSubmissionContexts()">刷新</button>
                </div>
                <div class="context-feed" id="contextFeed">
                    <div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>OmniMe v0.1.0 - 所有数据仅存储在本地</p>
        </footer>
    </div>

    <script>
        let currentDate = new Date();
        let serverTodayDate = null;
        let hourlyChart = null;
        let currentTab = 'overview';

        const appIcons = {
            '微信': '💬', 'Cursor': '💻', 'Obsidian': '📝', 'Kim': '📚',
            'Safari': '🌐', 'Chrome': '🌐', 'VS Code': '💻', '终端': '⬛',
            'iTerm': '⬛', '邮件': '📧', '备忘录': '📒', '飞书': '🐦',
            '钉钉': '💼', 'Slack': '💬', 'Notion': '📓', 'default': '📱'
        };

        document.addEventListener('DOMContentLoaded', initializeDashboard);

        async function initializeDashboard() {
            const datePicker = document.getElementById('datePicker');
            serverTodayDate = await fetchServerTodayDate();
            datePicker.value = serverTodayDate || formatDate(currentDate);
            currentDate = parseDateValue(datePicker.value);
            await loadData();
            setInterval(refreshTodayView, 15000);
        }

        async function fetchServerTodayDate() {
            try {
                const status = await fetch('/api/status').then(r => r.json());
                serverTodayDate = status.today_date || serverTodayDate;
                return serverTodayDate;
            } catch (error) {
                console.error('加载系统状态失败:', error);
                return serverTodayDate;
            }
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function parseDateValue(value) {
            const [year, month, day] = value.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function changeDate(delta) {
            currentDate = parseDateValue(document.getElementById('datePicker').value);
            currentDate.setDate(currentDate.getDate() + delta);
            document.getElementById('datePicker').value = formatDate(currentDate);
            loadData();
        }

        async function goToToday() {
            const today = await fetchServerTodayDate();
            if (today) {
                document.getElementById('datePicker').value = today;
                currentDate = parseDateValue(today);
            } else {
                currentDate = new Date();
                document.getElementById('datePicker').value = formatDate(currentDate);
            }
            await loadData();
        }

        function onDatePickerChange() {
            const dateStr = document.getElementById('datePicker').value;
            currentDate = parseDateValue(dateStr);
            loadData();
        }

        async function refreshTodayView() {
            const datePicker = document.getElementById('datePicker');
            const previousTodayDate = serverTodayDate;
            const today = await fetchServerTodayDate();
            if (!today) return;

            if (datePicker.value === today) {
                await loadData();
                return;
            }

            if (previousTodayDate && datePicker.value === previousTodayDate) {
                datePicker.value = today;
                currentDate = parseDateValue(today);
                await loadData();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'content') {
                loadContentByApp();
            } else if (tab === 'analysis') {
                loadAnalysis();
            } else if (tab === 'context') {
                loadSubmissionContexts();
            }
        }

        async function loadData() {
            const dateStr = document.getElementById('datePicker').value;
            currentDate = parseDateValue(dateStr);

            try {
                const [appStats, hourlyStats] = await Promise.all([
                    fetch(`/api/stats/apps?target_date=${dateStr}`).then(r => r.json()),
                    fetch(`/api/stats/hourly?target_date=${dateStr}`).then(r => r.json())
                ]);

                updateOverview(buildOverviewFromAppStats(dateStr, appStats));
                updateAppList(appStats);
                updateHourlyChart(hourlyStats);

                if (currentTab === 'content') {
                    loadContentByApp();
                } else if (currentTab === 'analysis') {
                    loadAnalysis();
                } else if (currentTab === 'context') {
                    loadSubmissionContexts();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function buildOverviewFromAppStats(dateStr, apps) {
            const safeApps = Array.isArray(apps) ? apps : [];
            return {
                date: dateStr,
                total_chars: safeApps.reduce((sum, app) => sum + (app.total_chars || 0), 0),
                total_apps: safeApps.length,
                total_sessions: safeApps.reduce((sum, app) => sum + (app.session_count || 0), 0),
                total_time_minutes: safeApps.reduce((sum, app) => sum + (app.total_time_minutes || 0), 0),
            };
        }

        function updateOverview(overview) {
            document.getElementById('todayChars').textContent = overview.total_chars.toLocaleString();
            document.getElementById('todayApps').textContent = overview.total_apps;
            document.getElementById('todaySessions').textContent = overview.total_sessions;
            
            const hours = Math.floor(overview.total_time_minutes / 60);
            const mins = Math.round(overview.total_time_minutes % 60);
            document.getElementById('todayTime').textContent = hours > 0 ? `${hours}h${mins}m` : `${mins}m`;
        }

        function updateAppList(apps) {
            const container = document.getElementById('appList');
            if (!apps || apps.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                return;
            }

            container.innerHTML = apps.slice(0, 8).map(app => `
                <li class="app-item">
                    <div class="app-icon">${appIcons[app.display_name] || appIcons.default}</div>
                    <div class="app-info">
                        <div class="app-name">${app.display_name}</div>
                        <div class="app-stats-text">${app.total_chars.toLocaleString()} 字符</div>
                    </div>
                    <div>
                        <div class="percentage-value">${app.percentage}%</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${app.percentage}%"></div></div>
                    </div>
                </li>
            `).join('');
        }

        function updateHourlyChart(data) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            const labels = data.map(d => `${d.hour}:00`);
            const values = data.map(d => d.chars);

            if (hourlyChart) hourlyChart.destroy();

            hourlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '字符数',
                        data: values,
                        backgroundColor: 'rgba(99, 102, 241, 0.6)',
                        borderColor: 'rgba(99, 102, 241, 1)',
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(42, 42, 58, 0.5)' }, ticks: { color: '#555566', maxRotation: 0, callback: (v, i) => i % 3 === 0 ? labels[i] : '' } },
                        y: { grid: { color: 'rgba(42, 42, 58, 0.5)' }, ticks: { color: '#555566', callback: v => v >= 1000 ? `${v/1000}k` : v } }
                    }
                }
            });
        }

        async function loadAnalysis() {
            const dateStr = document.getElementById('datePicker').value;
            const aiContainer = document.getElementById('aiAnalysisContent');
            const workPathContainer = document.getElementById('workPathContent');
            
            aiContainer.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>';
            workPathContainer.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>';
            
            try {
                const report = await fetch(`/api/report/${dateStr}`).then(r => r.json());
                
                // 更新 AI 分析
                updateAIAnalysis(report);
                
                // 更新工作路径分析
                updateWorkPath(report.work_path);
            } catch (error) {
                console.error('加载分析失败:', error);
                aiContainer.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
                workPathContainer.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
        }

        function updateAIAnalysis(report) {
            const container = document.getElementById('aiAnalysisContent');
            
            let html = '';
            
            // 总结
            if (report.summary) {
                html += `
                    <div class="analysis-section">
                        <h3 class="analysis-title">📝 今日总结</h3>
                        <div class="analysis-text">${escapeHtml(report.summary)}</div>
                    </div>
                `;
            }
            
            // AI 工作分析
            if (report.ai_work_analysis) {
                const analysisText = escapeHtml(report.ai_work_analysis)
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');
                html += `
                    <div class="analysis-section">
                        <h3 class="analysis-title">🤖 AI 深度分析</h3>
                        <div class="analysis-text"><p>${analysisText}</p></div>
                    </div>
                `;
            }
            
            // 建议
            if (report.suggestions && report.suggestions.length > 0) {
                html += `
                    <div class="analysis-section">
                        <h3 class="analysis-title">💡 优化建议</h3>
                        <ul class="suggestions-list">
                            ${report.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (!html) {
                html = '<div class="empty-state"><div class="icon">📭</div><p>暂无分析数据</p></div>';
            }
            
            container.innerHTML = html;
        }

        function updateWorkPath(workPath) {
            const container = document.getElementById('workPathContent');
            
            if (!workPath) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无工作路径数据</p></div>';
                return;
            }
            
            let html = `
                <div class="work-path-stats">
                    <div class="work-path-stat-item">
                        <div class="stat-label">工作模式</div>
                        <div class="stat-value">${workPath.work_pattern}</div>
                    </div>
                    <div class="work-path-stat-item">
                        <div class="stat-label">效率分数</div>
                        <div class="stat-value">${workPath.efficiency_score}/100</div>
                    </div>
                    <div class="work-path-stat-item">
                        <div class="stat-label">应用切换</div>
                        <div class="stat-value">${workPath.app_switches} 次</div>
                    </div>
                    <div class="work-path-stat-item">
                        <div class="stat-label">工作片段</div>
                        <div class="stat-value">${workPath.total_segments} 个</div>
                    </div>
                </div>
            `;
            
            // 峰值时段
            if (workPath.peak_hours && workPath.peak_hours.length > 0) {
                html += `
                    <div class="work-path-section">
                        <h3 class="work-path-title">⏰ 峰值时段</h3>
                        <div class="peak-hours">
                            ${workPath.peak_hours.map(p => `
                                <div class="peak-hour-item">
                                    <span class="peak-hour-time">${p.hour}:00</span>
                                    <span class="peak-hour-chars">${p.chars.toLocaleString()} 字符</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // 专注时段
            if (workPath.focus_periods && workPath.focus_periods.length > 0) {
                html += `
                    <div class="work-path-section">
                        <h3 class="work-path-title">🎯 深度工作时段</h3>
                        <div class="focus-periods">
                            ${workPath.focus_periods.map(p => {
                                const start = new Date(p.start);
                                const end = new Date(p.end);
                                return `
                                    <div class="focus-period-item">
                                        <div class="focus-period-time">
                                            ${start.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})} - 
                                            ${end.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}
                                        </div>
                                        <div class="focus-period-app">${p.app}</div>
                                        <div class="focus-period-duration">${Math.round(p.duration_minutes)} 分钟</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        async function loadContentByApp() {
            const dateStr = document.getElementById('datePicker').value;
            const container = document.getElementById('appContentList');
            
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>加载中...</span></div>';

            try {
                const data = await fetch(`/api/content/by-app?target_date=${dateStr}`).then(r => r.json());
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无输入内容</p></div>';
                    return;
                }

                container.innerHTML = data.map((app, index) => `
                    <div class="app-content-item ${index === 0 ? 'expanded' : ''}" onclick="toggleAppContent(this)">
                        <div class="app-content-header">
                            <div class="app-content-info">
                                <div class="app-content-icon">${appIcons[app.display_name] || appIcons.default}</div>
                                <div>
                                    <div class="app-content-name">${app.display_name}</div>
                                    <div class="app-content-stats">${app.total_chars.toLocaleString()} 字符 · ${app.session_count} 个片段</div>
                                </div>
                            </div>
                            <div class="app-content-toggle">▼</div>
                        </div>
                        <div class="app-content-body">
                            <div class="content-text">${escapeHtml(app.full_content) || '(无内容)'}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载内容失败:', error);
                container.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
        }

        function toggleAppContent(element) {
            element.classList.toggle('expanded');
        }

        async function loadSubmissionContexts() {
            const dateStr = document.getElementById('datePicker').value;
            const container = document.getElementById('contextFeed');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>加载上下文证据...</span></div>';

            try {
                const data = await fetch(`/api/submissions?target_date=${dateStr}&limit=100`).then(r => r.json());
                const submissions = data.submissions || [];
                if (submissions.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">🧠</div><p>暂无 Enter 上下文记录</p></div>';
                    return;
                }
                container.innerHTML = submissions.map(renderSubmissionContext).join('');
            } catch (error) {
                console.error('加载上下文失败:', error);
                container.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
        }

        function renderSubmissionContext(item) {
            const analysis = item.qwen_analysis || {};
            const visibleText = Array.isArray(analysis.visible_relevant_text) ? analysis.visible_relevant_text : [];
            const statusClass = item.analysis_status || 'pending';
            return `
                <article class="context-card">
                    <div class="context-card-header">
                        <div>
                            <div class="context-app">${appIcons[item.display_name] || appIcons.default} ${escapeHtml(item.display_name || item.app_name)}</div>
                            <div class="context-meta">${formatTimestamp(item.timestamp)} · ${escapeHtml(item.window_title || '未知窗口')} · ${item.char_count} 字符</div>
                        </div>
                        <div class="context-badges">
                            <span class="context-badge ${escapeHtml(item.capture_status || '')}">捕获 ${escapeHtml(item.capture_status || 'unknown')}</span>
                            <span class="context-badge ${escapeHtml(statusClass)}">Qwen ${escapeHtml(item.analysis_status || 'pending')}</span>
                        </div>
                    </div>
                    <div class="context-card-body">
                        <div>
                            <div class="context-text">${escapeHtml(item.content || '')}</div>
                            <div class="context-analysis">
                                <div class="context-analysis-title">Qwen 多模态识别</div>
                                ${analysis.context_type ? `<div>类型：${escapeHtml(analysis.context_type)} · 置信度：${escapeHtml(String(analysis.confidence ?? 'n/a'))}</div>` : `<div>${escapeHtml(item.analysis_error || item.qwen_raw_output || '等待本地 Qwen-VL 分析')}</div>`}
                                ${analysis.visible_topic ? `<div>主题：${escapeHtml(analysis.visible_topic)}</div>` : ''}
                                ${analysis.user_intent ? `<div>意图：${escapeHtml(analysis.user_intent)}</div>` : ''}
                                ${analysis.surrounding_messages_summary ? `<div>上下文摘要：${escapeHtml(analysis.surrounding_messages_summary)}</div>` : ''}
                                ${visibleText.length ? `<div>可见文本：${visibleText.map(escapeHtml).join(' / ')}</div>` : ''}
                            </div>
                            <div class="context-kv">
                                <div>输入控件：${escapeHtml(item.focused_role || 'unknown')}</div>
                                <div>容器：${escapeHtml(item.container_role || 'unknown')}</div>
                                <div>模型：${escapeHtml(item.qwen_model || 'not-loaded')}</div>
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function formatTimestamp(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            if (Number.isNaN(d.getTime())) return ts;
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadThemeAnalysis() {
            const dateStr = document.getElementById('datePicker').value;
            const container = document.getElementById('themeAnalysisContent');
            
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>正在生成 AI 深度分析，请稍候...</span></div>';
            
            try {
                const theme = await fetch(`/api/analysis/theme/${dateStr}`).then(r => r.json());
                
                if (!theme) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据，无法生成分析</p></div>';
                    return;
                }
                
                updateThemeAnalysis(theme);
            } catch (error) {
                console.error('加载主题分析失败:', error);
                container.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>分析失败，请确保已配置 OpenAI API Key</p></div>';
            }
        }

        function updateThemeAnalysis(theme) {
            const container = document.getElementById('themeAnalysisContent');
            
            let html = '';
            
            // 今日主题
            if (theme.themes && theme.themes.length > 0) {
                html += `
                    <div class="theme-section">
                        <h3 class="theme-title">🎯 今日主题</h3>
                        <div class="theme-tags">
                            ${theme.themes.map(t => `<span class="theme-tag">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            // 工作重点回顾
            if (theme.work_focus) {
                html += `
                    <div class="theme-section">
                        <h3 class="theme-title">📋 工作重点回顾</h3>
                        <div class="theme-content-box">${escapeHtml(theme.work_focus)}</div>
                    </div>
                `;
            }
            
            // 当前关注
            if (theme.current_interests && theme.current_interests.length > 0) {
                html += `
                    <div class="theme-section">
                        <h3 class="theme-title">🔍 当前关注</h3>
                        <div class="interest-list">
                            ${theme.current_interests.map(interest => `
                                <div class="interest-item">
                                    <span class="interest-icon">•</span>
                                    <span>${escapeHtml(interest)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // 洞察与启发
            if (theme.insights && theme.insights.length > 0) {
                html += `
                    <div class="theme-section">
                        <h3 class="theme-title">💡 洞察与启发</h3>
                        <div class="insight-list">
                            ${theme.insights.map(insight => `
                                <div class="insight-item">
                                    <span class="insight-icon">✨</span>
                                    <span class="insight-text">${escapeHtml(insight)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // 详细总结
            if (theme.detailed_summary) {
                html += `
                    <div class="theme-section">
                        <h3 class="theme-title">📝 深度总结</h3>
                        <div class="theme-content-box">${escapeHtml(theme.detailed_summary)}</div>
                    </div>
                `;
            }
            
            if (!html) {
                html = '<div class="empty-state"><div class="icon">📭</div><p>暂无分析数据</p></div>';
            }
            
            container.innerHTML = html;
        }
    </script>
</body>
</html>
